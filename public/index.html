<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script> <!-- Optional icon pack -->
</head>
<body class="dark-theme">
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <div class="app-container">
        <header class="app-header">
            <h1>Time<span>Tracker</span></h1>
            <p>Master your time, beautifully.</p>
        </header>

        <main class="main-content">
            <!-- Dashboard Stats -->
            <section class="glass-card dashboard-section">
                <div class="stat-box">
                    <h3>Total Time Tracked</h3>
                    <div class="stat-value" id="stat-total-time">00:00:00</div>
                </div>
                <div class="stat-box">
                    <h3>Tasks Completed</h3>
                    <div class="stat-value" id="stat-completed-tasks">0</div>
                </div>
            </section>
            <!-- Timer Card -->
            <section class="glass-card timer-section">
                <div class="timer-display">
                    <span id="display-hours">00</span>:<span id="display-minutes">00</span>:<span id="display-seconds">00</span>
                </div>
                
                <form id="active-task-form">
                    <div class="input-group">
                        <input type="text" id="task-title" placeholder="What are you working on?" required autocomplete="off">
                    </div>
                    <div class="input-row">
                        <div class="input-group project-select-group">
                            <label for="task-project">Project</label>
                            <select id="task-project">
                                <option value="">No Project</option>
                            </select>
                        </div>
                        <div class="input-group color-picker-group">
                            <label for="task-color">Color</label>
                            <input type="color" id="task-color" value="#3B82F6">
                        </div>
                    </div>
                    
                    <div class="timer-controls">
                        <button type="button" id="btn-start" class="btn btn-primary">Start Timer</button>
                        <button type="button" id="btn-stop" class="btn btn-danger hidden">Stop Timer</button>
                    </div>
                </form>
            </section>

            <!-- Tasks List Card -->
            <section class="glass-card tasks-section">
                <div class="tasks-header">
                    <h2>Recent Tasks</h2>
                    <div class="header-actions">
                        <button class="btn btn-secondary btn-sm" id="btn-manage-projects">Projects</button>
                        <button class="btn btn-secondary btn-sm" id="btn-manual-add">+ Log Time</button>
                    </div>
                </div>
                <div class="filter-group">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="completed">Completed</button>
                    </div>
                </div>

                <div class="tasks-list" id="tasks-list">
                    <!-- Tasks will be injected here via JS -->
                    <div class="loading">Loading your tasks...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay hidden" id="edit-modal">
        <div class="glass-card modal-content">
            <h2>Edit Task</h2>
            <form id="edit-task-form">
                <input type="hidden" id="edit-task-id">
                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="edit-task-title" required>
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="edit-task-desc" rows="2"></textarea>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Project</label>
                        <select id="edit-task-project">
                            <option value="">No Project</option>
                        </select>
                    </div>
                    <div class="input-group color-picker-group">
                        <label>Color</label>
                        <input type="color" id="edit-task-color">
                    </div>
                </div>
                <div class="input-group">
                    <label>Status</label>
                    <select id="edit-task-status">
                        <option value="pending">Pending</option>
                        <option value="in_progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="btn-close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Manual Task Modal -->
    <div class="modal-overlay hidden" id="manual-add-modal">
        <div class="glass-card modal-content">
            <h2>Log Time Manually</h2>
            <form id="manual-add-form">
                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="manual-task-title" required>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Hours</label>
                        <input type="number" id="manual-task-hours" min="0" value="0">
                    </div>
                    <div class="input-group">
                        <label>Minutes</label>
                        <input type="number" id="manual-task-minutes" min="0" max="59" value="0">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Project</label>
                        <select id="manual-task-project">
                            <option value="">No Project</option>
                        </select>
                    </div>
                    <div class="input-group color-picker-group">
                        <label>Color</label>
                        <input type="color" id="manual-task-color" value="#3b82f6">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="btn-close-manual">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Projects Modal -->
    <div class="modal-overlay hidden" id="projects-modal">
        <div class="glass-card modal-content" style="max-width: 600px;">
            <h2>Manage Projects</h2>
            <form id="add-project-form" style="margin-bottom: 2rem;">
                <div class="input-row">
                    <div class="input-group" style="flex: 2;">
                        <input type="text" id="new-project-name" placeholder="New Project Name" required>
                    </div>
                    <div class="input-group color-picker-group" style="flex: 1;">
                        <input type="color" id="new-project-color" value="#8b5cf6">
                        <button type="submit" class="btn btn-primary btn-sm">Add</button>
                    </div>
                </div>
            </form>
            <div class="projects-list" id="projects-list">
                <!-- Projects injected here -->
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="btn-close-projects" style="width: 100%;">Close</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
